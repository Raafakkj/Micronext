<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Micronext | Perfil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="kanban-body">
    <div class="app-shell menu-collapsed">
      <aside class="side-menu">
        <div class="brand-block">
          <img src="./kangaroo.svg" alt="Logo Kangaroo" class="brand-logo" />
        </div>

        <nav class="menu-links">
          <a class="menu-link" href="./kanban.html">Kanban</a>
          <a class="menu-link" href="./sprints.html">Sprints</a>
          <a class="menu-link active" href="./settings.html">Perfil</a>
          <a class="menu-link" href="./community.html">Comunidade</a>
          <a class="menu-link" href="./register.html">Novo RM</a>
        </nav>
      </aside>

      <main class="app-main">
        <header class="topbar">
          <div class="topbar-left">
            <button class="menu-peek-btn" data-menu-peek type="button" aria-label="Mostrar menu">Menu</button>
            <div>
              <h1>Configuracoes de Usuario</h1>
              <small id="user-info"></small>
            </div>
          </div>
          <nav class="actions">
            <button id="logs-toggle" class="notif-btn" type="button" aria-label="Ver notificacoes">
              Notifs <span id="logs-badge" class="badge">0</span>
            </button>
            <button id="logout" class="danger-btn" type="button">Sair</button>
          </nav>
        </header>

        <section class="page-grid one-col">
          <section class="panel">
            <h3>Meu Perfil Scrum</h3>
            <form id="settings-form" class="settings-form" novalidate>
              <div id="avatar-preview" class="avatar-preview">RM</div>

              <label for="full-name">Nome verdadeiro</label>
              <input id="full-name" name="fullName" type="text" minlength="3" maxlength="60" required />

              <label for="username">Nome de usuario</label>
              <input id="username" name="username" type="text" minlength="3" maxlength="30" required />

              <label for="role">Funcao no Scrum</label>
              <select id="role" name="role" class="input-like" required>
                <option value="PO">PO</option>
                <option value="Scrum Master">Scrum Master</option>
                <option value="Developer">Developer</option>
              </select>

              <label for="avatar-upload">Foto de perfil</label>
              <input id="avatar-upload" name="avatar" type="file" accept="image/*" />

              <div class="settings-actions">
                <button type="submit">Salvar perfil</button>
                <button id="clear-avatar" type="button" class="ghost-btn">Remover foto</button>
              </div>
              <p id="settings-message" class="message"></p>
            </form>
          </section>

          <section class="panel">
            <h3>Seguranca de Acesso</h3>

            <form id="login-form" class="settings-form" novalidate>
              <label for="new-rm">Novo login (RM)</label>
              <input id="new-rm" name="newRm" type="text" inputmode="numeric" maxlength="7" placeholder="Ex: 559999" required />

              <label for="login-password">Senha atual</label>
              <input id="login-password" name="currentPassword" type="password" required />

              <button type="submit">Atualizar login</button>
              <p id="login-message" class="message"></p>
            </form>

            <form id="password-form" class="settings-form" novalidate>
              <label for="current-password">Senha atual</label>
              <input id="current-password" name="currentPassword" type="password" required />

              <label for="new-password">Nova senha</label>
              <input id="new-password" name="newPassword" type="password" minlength="6" required />

              <label for="confirm-password">Confirmar nova senha</label>
              <input id="confirm-password" name="confirmPassword" type="password" minlength="6" required />

              <button type="submit">Atualizar senha</button>
              <p id="password-message" class="message"></p>
            </form>

          </section>
        </section>

        <section id="logs-dropdown" class="panel logs-dropdown hidden">
          <h3>Ultimas Alteracoes</h3>
          <ul id="logs-list" class="logs-list"></ul>
        </section>
      </main>
    </div>

    <script src="./cloud-sync.js"></script>
    <script src="./auth-utils.js"></script>
    <script src="./ui.js"></script>
    <script src="./widgets.js"></script>
    <script src="./settings.js"></script>
  </body>
</html>
